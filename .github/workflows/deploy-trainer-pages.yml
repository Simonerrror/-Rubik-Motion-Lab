name: Deploy Trainer (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/trainer/**'
      - 'tools/trainer/**'
      - 'packages/cubeanim/**'
      - 'db/cards/**'
      - 'data/f2l/**'
      - '.github/workflows/deploy-trainer-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: trainer-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Rebuild trainer catalog and prune recognizers
        run: PYTHONPATH=packages/cubeanim/src uv run python tools/trainer/build_trainer_catalog.py --output apps/trainer --assets-dir apps/trainer/assets --base-catalog-url ./assets

      - name: Guard recognizer asset diff
        run: git diff --exit-code -- apps/trainer/assets/recognizers

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload trainer artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/trainer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
