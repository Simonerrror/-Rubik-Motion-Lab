<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubik Motion Trainer</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preload" href="./assets/previews/trainer-preview-pll.png" as="image" fetchpriority="high" />
  <link rel="preload" href="./assets/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="app-layout">
      <aside id="catalog-sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand-row">
            <div class="sidebar-brand">
              <div class="app-kicker">Rubik Motion Lab</div>
              <div class="sidebar-brand-title">Trainer</div>
            </div>
            <div id="sidebar-utility-slot" class="sidebar-utility-slot">
              <div id="utility-rail" class="utility-rail">
                <button id="help-open-btn" class="trainer-btn trainer-btn-accent utility-btn" type="button" aria-label="Open help" data-testid="help-open">Help</button>
                <button id="export-profile-btn" class="trainer-btn utility-btn" type="button" data-testid="export-profile">Экспорт</button>
                <button id="import-profile-btn" class="trainer-btn utility-btn" type="button" data-testid="import-profile">Импорт</button>
              </div>
            </div>
          </div>
          <div class="sidebar-topbar">
            <div class="sidebar-tabs">
              <button class="nav-tab" data-category="F2L" data-testid="tab-f2l">F2L</button>
              <button class="nav-tab" data-category="OLL" data-testid="tab-oll">OLL</button>
              <button class="nav-tab active" data-category="PLL" data-testid="tab-pll">PLL</button>
            </div>
            <label class="sort-toggle" for="sort-progress-toggle">
              <input id="sort-progress-toggle" type="checkbox" />
              <span>Progress Sort</span>
            </label>
          </div>
        </div>
        <div id="catalog-container" class="catalog-container" data-testid="catalog-container"></div>
      </aside>

      <main id="details-pane" class="details-pane">
        <div class="details-grid">
          <section class="details-main">
            <div class="details-heading">
              <div class="details-heading-copy">
                <h2 id="m-name" class="case-title">Select Case</h2>
                <div id="m-case-code" class="case-meta">-</div>
                <div id="m-prob" class="case-meta">Probability: n/a</div>
              </div>
              <div class="details-heading-actions">
                <button id="shell-back-btn" class="trainer-btn trainer-btn-ghost" type="button" aria-label="Back to catalog">Catalog</button>
                <button id="shell-settings-btn" class="trainer-btn" type="button" aria-label="Open settings" data-testid="open-settings">Settings</button>
              </div>
            </div>

            <div class="video-frame">
              <div id="sandbox-frame" class="sandbox-frame" data-testid="sandbox-frame">
                <div class="sandbox-stage">
                  <div id="sandbox-preview" class="sandbox-preview" data-visible="true" data-status="idle">
                    <img
                      id="sandbox-preview-image"
                      class="sandbox-preview-image"
                      src="./assets/previews/trainer-preview-pll.png"
                      width="960"
                      height="540"
                      fetchpriority="high"
                      decoding="async"
                      alt="Sandbox baked preview"
                    />
                    <div id="sandbox-preview-label" class="sandbox-preview-label"></div>
                  </div>
                  <canvas id="sandbox-canvas" class="sandbox-canvas"></canvas>
                  <div class="sandbox-overlay sandbox-overlay-top-right">
                    <div class="sandbox-top-panel">
                      <img id="sandbox-overlay-top-image" class="sandbox-top-image" alt="Case diagram" />
                    </div>
                  </div>
                </div>
                <div class="sandbox-controls">
                  <div class="sandbox-controls-left">
                    <button id="sandbox-to-start-btn" class="sandbox-btn sandbox-btn-icon" type="button" title="Back to start" aria-label="Back to start">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 5V19"></path>
                        <polygon class="fill-icon" points="18,6 9,12 18,18"></polygon>
                      </svg>
                    </button>
                    <button id="sandbox-prev-btn" class="sandbox-btn sandbox-btn-step" type="button" title="Previous step" aria-label="Previous step">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <polygon class="fill-icon" points="15.5,6 8.5,12 15.5,18"></polygon>
                        <polygon class="fill-icon" points="20,6 13,12 20,18"></polygon>
                      </svg>
                    </button>
                    <button id="sandbox-play-pause-btn" class="sandbox-btn sandbox-btn-primary" type="button" title="Play/Pause" aria-label="Play/Pause">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <polygon class="fill-icon" points="8,6 18,12 8,18"></polygon>
                      </svg>
                    </button>
                    <button id="sandbox-next-btn" class="sandbox-btn sandbox-btn-step" type="button" title="Next step" aria-label="Next step">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <polygon class="fill-icon" points="8.5,6 15.5,12 8.5,18"></polygon>
                        <polygon class="fill-icon" points="13,6 20,12 13,18"></polygon>
                      </svg>
                    </button>
                  </div>
                  <button id="sandbox-speed-toggle-btn" class="sandbox-btn sandbox-speed-toggle" type="button" aria-label="Playback speed">×1</button>
                  <div class="sandbox-timeline" role="group" aria-label="Sandbox timeline">
                    <input id="sandbox-timeline-slider" class="sandbox-timeline-slider" type="range" min="0" max="0" step="0.001" value="0" />
                  </div>
                </div>
              </div>
            </div>

            <div class="active-algo-display">
              <div class="panel-label">Active Algorithm</div>
              <div id="active-algo-display"></div>
            </div>
          </section>

          <aside id="details-side" class="details-side">
            <div class="mobile-sheet-head">
              <div>
                <div class="mobile-sheet-kicker">Case Controls</div>
                <div class="mobile-sheet-title">Status + Algorithms</div>
              </div>
              <div id="mobile-utility-slot" class="mobile-utility-slot"></div>
              <button id="mobile-settings-close-btn" class="trainer-btn trainer-btn-ghost" type="button" aria-label="Close settings">Close</button>
            </div>

            <div class="panel">
              <label class="panel-label">Learning Status</label>
              <div id="m-status-group" class="status-group">
                <button class="status-btn" data-status="NEW" data-testid="status-new">NEW</button>
                <button class="status-btn" data-status="IN_PROGRESS" data-testid="status-work">WORK</button>
                <button class="status-btn" data-status="LEARNED" data-testid="status-done">DONE</button>
              </div>
            </div>

            <div class="panel panel-algorithms">
              <label class="panel-label">Algorithm Selection</label>
              <div id="m-algo-list" class="algo-list"></div>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <div id="settings-backdrop" class="sheet-backdrop" aria-hidden="true"></div>
  </div>

  <div class="toast" id="toast"></div>

  <div id="profile-modal" class="profile-modal hidden">
    <div class="profile-modal-card">
      <div class="profile-modal-head">Profile Transfer</div>
      <textarea id="profile-data" class="profile-textarea" rows="8" placeholder="Base64URL code"></textarea>
      <div class="profile-actions">
        <button id="profile-apply-btn" class="trainer-btn" type="button">Apply</button>
        <button id="profile-copy-btn" class="trainer-btn" type="button">Copy</button>
        <button id="profile-close-btn" class="trainer-btn" type="button">Close</button>
      </div>
      <div id="profile-msg" class="profile-msg" aria-live="polite"></div>
    </div>
  </div>

  <div id="manual-modal" class="manual-modal hidden" aria-hidden="true">
    <section class="manual-card" role="dialog" aria-modal="true" aria-labelledby="manual-title">
      <div class="manual-head">
        <div>
          <div class="manual-kicker">Bilingual Guide</div>
          <h2 id="manual-title" class="manual-title">Trainer Manual</h2>
        </div>
        <div class="manual-actions">
          <button id="manual-lang-ru" class="manual-lang-btn active" type="button" data-testid="help-lang-ru">RU</button>
          <button id="manual-lang-en" class="manual-lang-btn" type="button" data-testid="help-lang-en">EN</button>
          <button id="manual-close-btn" class="trainer-btn trainer-btn-ghost" type="button" aria-label="Close manual">Close</button>
        </div>
      </div>
      <div class="manual-layout">
        <nav id="manual-toc" class="manual-toc" aria-label="Manual sections"></nav>
        <div id="manual-content" class="manual-content"></div>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
