<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik Motion Lab - Cards</title>
    <link rel="icon" type="image/svg+xml" href="/static/cards/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/cards/styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-topbar">
                    <div class="sidebar-tabs">
                        <button class="nav-tab" data-category="F2L" data-testid="tab-f2l">F2L</button>
                        <button class="nav-tab" data-category="OLL" data-testid="tab-oll">OLL</button>
                        <button class="nav-tab active" data-category="PLL" data-testid="tab-pll">PLL</button>
                    </div>
                    <label class="sort-toggle" for="sort-progress-toggle">
                        <input id="sort-progress-toggle" type="checkbox">
                        <span>Progress Sort</span>
                    </label>
                </div>
            </div>
            <div id="catalog-container" class="catalog-container" data-testid="catalog-container"></div>
        </aside>

        <main id="details-pane" class="details-pane">
            <div class="details-grid">
                <section class="details-main">
                    <div>
                        <h2 id="m-name" class="case-title">Select Case</h2>
                        <div id="m-case-code" class="case-meta">-</div>
                        <div id="m-prob" class="case-meta">Probability: n/a</div>
                    </div>

                    <div class="video-frame">
                        <video id="m-video" class="video-player" controls autoplay loop muted></video>
                        <div id="m-queue-msg" class="queue-overlay">Select case</div>
                    </div>

                    <div class="active-algo-display">
                        <div class="panel-label">Active Algorithm</div>
                        <div id="active-algo-display"></div>
                    </div>

                    <div class="render-actions">
                        <button class="render-btn render-btn-primary" id="m-render-draft-btn" data-testid="btn-render-draft">Generate Draft</button>
                        <button class="render-btn render-btn-secondary" id="m-render-btn" data-testid="btn-render-hd">Request HD Render</button>
                    </div>
                </section>

                <section class="details-side">
                    <div class="panel">
                        <label class="panel-label">Learning Status</label>
                        <div id="m-status-group" class="status-group">
                            <button class="status-btn" data-status="NEW" data-testid="status-new">NEW</button>
                            <button class="status-btn" data-status="IN_PROGRESS" data-testid="status-work">WORK</button>
                            <button class="status-btn" data-status="LEARNED" data-testid="status-done">DONE</button>
                        </div>
                    </div>

                    <div class="panel panel-algorithms">
                        <label class="panel-label">Algorithm Selection</label>
                        <div id="m-algo-list" class="algo-list"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/static/cards/app.js"></script>
</body>
</html>
